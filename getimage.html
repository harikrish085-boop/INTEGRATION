<!DOCTYPE html>
<html>
<head>

    <title>MES Image Viewer</title>

    <style>

        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        .card {

            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

            width: 800px;
            margin: auto;
        }

        img {

            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .label {

            font-weight: bold;
            margin-top: 10px;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>MES Image Viewer</h2>

    <div>
        <span class="label">Machine ID:</span>
        <span id="machineId"></span>
    </div>

    <div>
        <span class="label">Image Name:</span>
        <span id="imageName"></span>
    </div>

    <div>
        <span class="label">Created At:</span>
        <span id="createdAt"></span>
    </div>

    <img id="imageView" />

</div>

<script>

    // API URL
    const apiUrl =
        "http://localhost:8088/system/webdev/samplequickstart/MESIntegration/api/images/getdisplyimg?machineId=M001";

    fetch(apiUrl)

    .then(response => response.json())

    .then(data => {

        console.log(data);

        if (data.status === "error") {

            alert(data.message);
            return;
        }

        // Set metadata
        document.getElementById("machineId").innerText =
            data.machineId;

        document.getElementById("imageName").innerText =
            data.imageName;

        document.getElementById("createdAt").innerText =
            data.createdAt;
        console.log("image data:", data.imageData.substring(0, 100));
        
        // Set image
        document.getElementById("imageView").src =
            "data:image/jpeg;base64," +
            data.imageData;

    })

    .catch(error => {

        console.error(error);

        alert("Failed to load image");

    });

</script>

</body>
</html>
